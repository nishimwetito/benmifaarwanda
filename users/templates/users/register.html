{% extends 'base.html' %}
{% load static %}
{% load crispy_forms_tags %}

{% block title %}Register page {% endblock %}

{% block content %}

<h2>Register</h2>

<form method="POST">
   {% csrf_token %}
   {{ form.as_p}}

   <button type="submit">Register</button>
</form>

<p>Already have an account? <a href="{% url 'login' %}">Login</a></p>



{% endblock %}
