{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Dashboard | BE2SAHOBE{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="{% static 'css/styles.css' %}" rel="stylesheet">
  <link href="{% static 'css/dashboard.css' %}" rel="stylesheet">
  <link href="{% static 'css/modals.css' %}" rel="stylesheet">
</head>
<body class="dash-layout">
  {% block dashboard_body %}{% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.querySelectorAll('[data-dash-toggle]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        document.querySelector('.dash-sidebar')?.classList.toggle('open');
        document.querySelector('.dash-overlay')?.classList.toggle('show');
      });
    });
    document.querySelector('.dash-overlay')?.addEventListener('click', function() {
      document.querySelector('.dash-sidebar')?.classList.remove('open');
      this.classList.remove('show');
    });
    document.querySelectorAll('.dash-subnav a[href^="#"]').forEach(function(link) {
      link.addEventListener('click', function(e) {
        var target = document.querySelector(this.getAttribute('href'));
        if (!target) return;
        e.preventDefault();
        document.querySelectorAll('.dash-subnav a[href^="#"]').forEach(function(l) { l.classList.remove('active'); });
        this.classList.add('active');
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });
  </script>
</body>
</html>
