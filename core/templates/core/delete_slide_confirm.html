{% extends "base.html" %}
{% load static %}

{% block title %} Delete Presentation | BE2SAHOBE LTD {% endblock %}

{% block content %}
<section class="py-6" style="padding: 100px 0;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0 text-center" style="border-radius: 20px; overflow: hidden;">
                    <div class="card-header bg-danger text-white p-4">
                        <i class="bi bi-exclamation-triangle-fill display-4 mb-2"></i>
                        <h3 class="mb-0" style="font-family: 'Cormorant Garamond', serif;">Delete Slides?</h3>
                    </div>
                    <div class="card-body p-4">
                        <p class="lead mb-4">Are you sure you want to delete this presentation?</p>
                        <div class="mb-4">
                            <img src="{{ slide.thumbnail.url }}" class="img-fluid rounded shadow-sm mb-3" style="max-height: 200px;" alt="Thumbnail">
                            <h5 class="fw-bold">{{ slide.title }}</h5>
                            <span class="badge bg-light text-primary border">{{ slide.get_category_display }}</span>
                        </div>
                        <form method="POST">
                            {% csrf_token %}
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-danger py-3 fw-bold">Delete Presentation Permanently</button>
                                <a href="{% url 'slides_list' %}" class="btn btn-outline-secondary py-3">No, Go Back</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
