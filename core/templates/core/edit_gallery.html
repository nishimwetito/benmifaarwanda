{% extends "base.html" %}
{% load static %}

{% block title %} Edit Gallery Item | BE2SAHOBE LTD {% endblock %}

{% block content %}
<section class="py-6" style="padding: 100px 0;">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow-lg border-0" style="border-radius: 20px; overflow: hidden;">
                    <div class="card-header bg-green-dark text-white p-4">
                        <h3 class="mb-0" style="font-family: 'Cormorant Garamond', serif;">Edit Gallery Item</h3>
                    </div>
                    <div class="card-body p-4">
                        <div class="mb-4 text-center">
                            <p class="text-muted small mb-2">Current Image:</p>
                            <img src="{{ item.image.url }}" alt="{{ item.title }}" class="img-fluid rounded shadow-sm" style="max-height: 200px;">
                        </div>
                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            {{ form.as_p }}
                            <div class="d-flex gap-2 mt-4">
                                <a href="{% url 'gallery' %}" class="btn btn-outline-secondary flex-grow-1">Cancel</a>
                                <button type="submit" class="btn btn-green flex-grow-1">Update Item</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
    .bg-green-dark { background: var(--green-dark); }
</style>
{% endblock %}
